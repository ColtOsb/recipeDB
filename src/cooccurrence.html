<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ingredient Co-occurrence — Recipe Graph DB</title>
        <link rel="stylesheet" href="public/css/style.css" />
    </head>
    <body>
        <header>
            <h1>Recipe Graph Database</h1>
            <p>CS-3600 — Blondell &amp; Osborn</p>
        </header>

        <nav class="page-nav">
            <a href="index.html">Graph Explorer</a>
            <a href="cooccurrence.html" class="active">Ingredient Co-occurrence</a>
            <a href="accessibility.html">Accessibility Index</a>
            <a href="influence.html">Influence Network</a>
        </nav>

        <div class="controls">
            <div class="search-wrapper">
                <input
                    type="text"
                    id="ingredient-search"
                    placeholder="Search for an ingredient..."
                    autocomplete="off"
                />
                <ul id="search-suggestions"></ul>
            </div>
            <label style="color:lightgray">
                Min shared recipes:
                <input type="number" id="min-count" min="1" value="2" style="width:70px;" />
            </label>
            <span id="status" style="color:lightgray">Search for an ingredient to see its co-occurrence network</span>
        </div>

        <div id="graph-container">
            <svg id="graph"></svg>
            <div id="tooltip"></div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
        <script src="scripts/cooccurrence.js"></script>
    </body>
</html>
